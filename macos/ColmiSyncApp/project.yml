name: ColmiSyncApp
options:
  bundleIdPrefix: com.clawd
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    PRODUCT_NAME: ColmiSync
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  ColmiKit:
    path: ../../ColmiKit
targets:
  ColmiSync:
    type: application
    platform: macOS
    sources:
      - path: ../ColmiSync/Sources
        excludes:
          - Info.plist
    dependencies:
      - package: ColmiKit
        product: ColmiProtocol
    settings:
      base:
        INFOPLIST_FILE: ../ColmiSync/Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ../ColmiSync/Sources/ColmiSync.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        LSUIElement: YES
